<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频审核</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 16px 24px;
            background: #16213e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 20px; color: #e94560; }
        .header .stats { font-size: 14px; color: #999; }
        .container {
            flex: 1;
            width: 100%;
            max-width: 1360px;
            padding: 20px;
        }
        .content-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 20px;
            align-items: start;
        }
        .video-info {
            width: 100%;
            text-align: center;
            margin-bottom: 12px;
        }
        .video-info h2 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 4px;
            word-break: break-all;
        }
        .video-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 4px;
        }
        .video-title-row h2 { margin-bottom: 0; }
        .video-info .meta {
            font-size: 13px;
            color: #888;
        }
        .review-status-bar {
            width: 100%;
            max-width: 960px;
            margin: 12px 0 0;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
        }
        .review-status-copy {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            color: #bbb;
            font-size: 13px;
        }
        .review-status-hint { color: #888; }
        .player-wrapper {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .player-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .player-wrapper .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 16px;
        }
        .controls {
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 16px;
        }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 160px;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-approve {
            background: #27ae60;
            color: #fff;
        }
        .btn-approve:hover:not(:disabled) { background: #2ecc71; }
        .btn-reject {
            background: #e74c3c;
            color: #fff;
        }
        .btn-reject:hover:not(:disabled) { background: #c0392b; }
        .btn-next {
            background: #3498db;
            color: #fff;
        }
        .btn-next:hover:not(:disabled) { background: #2980b9; }
        .btn-prev {
            background: #9b59b6;
            color: #fff;
        }
        .btn-prev:hover:not(:disabled) { background: #8e44ad; }
        .btn-search {
            background: #e94560;
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            min-width: auto;
        }
        .btn-search:hover:not(:disabled) { background: #c0392b; }
        .btn-clear {
            background: #7f8c8d;
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            min-width: auto;
        }
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-tools {
            width: 100%;
            padding: 12px 24px;
            background: #13203a;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: center;
        }
        .page-tools-inner {
            width: 100%;
            max-width: 1360px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
        }
        .page-tool-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            color: #bbb;
            font-size: 14px;
        }
        .page-tool-group label {
            color: #bbb;
        }
        .page-tool-input {
            width: 96px;
            padding: 8px 12px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            outline: none;
        }
        .page-tool-input:focus {
            border-color: #3498db;
        }
        .btn-page {
            background: #3498db;
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            min-width: auto;
        }
        .btn-page:hover:not(:disabled) { background: #2980b9; }
        .btn-mark {
            background: #8e44ad;
            color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            min-width: auto;
        }
        .btn-mark:hover:not(:disabled) { background: #7d3c98; }
        .filter-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
            font-size: 13px;
            color: #aaa;
            cursor: pointer;
            user-select: none;
        }
        .filter-toggle input[type="checkbox"] {
            accent-color: #e94560;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .filter-toggle.active {
            color: #e94560;
        }
        .search-bar input {
            padding: 8px 12px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            width: 220px;
            outline: none;
        }
        .search-bar input:focus {
            border-color: #e94560;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .toast.info { background: #3498db; }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: #888;
        }
        .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: #ccc; }
        .empty-state p { font-size: 16px; }
        .playlist-panel {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 16px;
            min-height: 400px;
        }
        .playlist-panel h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #fff;
        }
        .playlist-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 72vh;
            overflow-y: auto;
        }
        .playlist-item {
            width: 100%;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            padding: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .playlist-item:hover {
            border-color: #3498db;
            transform: translateY(-1px);
        }
        .playlist-item.current {
            border-color: #e94560;
            box-shadow: 0 0 0 1px rgba(233, 69, 96, 0.3);
        }
        .playlist-item.status-approved { border-left: 3px solid #27ae60; }
        .playlist-item.status-rejected { border-left: 3px solid #e74c3c; }
        .playlist-item.status-recheck { border-left: 3px solid #f39c12; }
        .playlist-item-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .playlist-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #999;
        }
        .playlist-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .playlist-badge.approved {
            background: rgba(39, 174, 96, 0.18);
            color: #58d68d;
        }
        .playlist-badge.rejected {
            background: rgba(231, 76, 60, 0.18);
            color: #f1948a;
        }
        .playlist-badge.recheck {
            background: rgba(243, 156, 18, 0.18);
            color: #f8c471;
        }
        .playlist-empty {
            color: #888;
            font-size: 14px;
            text-align: center;
            padding: 24px 12px;
        }

        .password-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .password-dialog {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            min-width: 320px;
        }
        .password-dialog h2 {
            color: #e94560;
            margin-bottom: 16px;
            font-size: 20px;
        }
        .password-dialog input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }
        .password-dialog input:focus {
            border-color: #e94560;
        }
        .password-dialog .btn-login {
            background: #e94560;
            color: #fff;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .password-dialog .btn-login:hover { background: #c0392b; }
        .password-dialog .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        /* Mobile responsive */
        @media (max-width: 960px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            .playlist-panel {
                min-height: 0;
            }
            .playlist-list {
                max-height: none;
            }
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 8px;
                padding: 12px 16px;
                text-align: center;
            }
            .header h1 { font-size: 18px; }
            .header .stats { font-size: 12px; }
            .search-bar { width: 100%; }
            .search-bar input { flex: 1; width: auto; }
            .page-tools {
                padding: 12px 16px;
            }
            .page-tools-inner {
                gap: 10px;
                justify-content: center;
            }
            .page-tool-group {
                width: 100%;
                justify-content: center;
            }
            .page-tool-input {
                width: 84px;
            }
            .container { padding: 12px; }
            .video-info h2 { font-size: 15px; }
            .video-info .meta { font-size: 12px; }
            .review-status-bar { align-items: flex-start; flex-direction: column; }
            .controls {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                margin-top: 14px;
            }
            .btn {
                padding: 12px 0;
                font-size: 15px;
                min-width: 0;
                flex: 1 1 30%;
            }
            .btn-clear {
                padding: 6px 12px;
                font-size: 12px;
            }
            .toast {
                left: 12px;
                right: 12px;
                text-align: center;
            }
            .empty-state { min-height: 250px; }
            .empty-state h2 { font-size: 20px; }
            .empty-state p { font-size: 14px; }
            .playlist-panel {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="password-overlay" id="passwordOverlay" style="display:none">
        <div class="password-dialog">
            <h2>🔒 操作验证</h2>
            <p style="color:#999;margin-bottom:16px;">请输入操作密码</p>
            <input type="password" id="passwordInput" placeholder="请输入密码..." />
            <button class="btn-login" onclick="submitPassword()">确认</button>
            <button class="btn-login" style="background:#7f8c8d;margin-top:8px;" onclick="cancelPassword()">取消</button>
            <div class="error-msg" id="passwordError">密码错误，请重试</div>
        </div>
    </div>
    <div class="header">
        <h1>📹 视频审核</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索视频标题..." aria-label="搜索视频标题" />
            <button class="btn btn-search" onclick="doSearch()" aria-label="搜索视频">🔍 搜索</button>
            <button class="btn btn-clear" onclick="clearSearch()" id="btnClearSearch" style="display:none" aria-label="清除搜索">✕ 清除</button>
        </div>
        <div class="stats">
            已判定: <span id="reviewedCount">0</span> 个 |
            当前页复审: <span id="recheckCount">0</span> 个 |
            当前页: <span id="currentPage">-</span> |
            总数: <span id="totalCount">-</span>
            <label class="filter-toggle" id="filterToggleLabel">
                <input type="checkbox" id="filterDisabled" onchange="toggleDisabledFilter()" />
                只显示被屏蔽视频
            </label>
            <label class="filter-toggle" id="recheckAllLabel">
                <input type="checkbox" id="recheckAll" onchange="toggleRecheckAll()" />
                所有视频进入复审（保留原结果）
            </label>
            <button class="btn btn-clear" onclick="clearReviewed()">清除审核记录</button>
        </div>
    </div>
    <div class="page-tools">
        <div class="page-tools-inner">
            <div class="page-tool-group">
                <label for="pageJumpInput">跳转到第</label>
                <input type="number" min="1" step="1" id="pageJumpInput" class="page-tool-input" placeholder="页码" aria-label="输入要跳转的页码" />
                <span>页</span>
                <button class="btn btn-page" type="button" id="btnPageJump" onclick="jumpToPage()">跳转</button>
            </div>
            <div class="page-tool-group">
                <label for="reviewedPageInput">从第</label>
                <input type="number" min="0" step="1" id="reviewedPageInput" class="page-tool-input" placeholder="页码" aria-label="输入继续审核的位置" />
                <span>页之后继续</span>
                <button class="btn btn-mark" type="button" id="btnReviewedPage" onclick="markReviewedPages()">继续</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="contentLayout" class="content-layout">
            <div id="videoSection">
                <div class="video-info">
                    <div class="video-title-row">
                        <h2 id="videoTitle">加载中...</h2>
                        <span id="currentReviewStatus" class="playlist-badge recheck" aria-live="polite">复审</span>
                    </div>
                    <div class="meta">
                        ID: <span id="videoId">-</span> |
                        时长: <span id="videoDuration">-</span> |
                        创建: <span id="videoDate">-</span>
                    </div>
                </div>

                <div class="player-wrapper">
                    <img id="videoCover" style="width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;z-index:1;cursor:pointer;" onclick="startPlayback()" />
                    <video id="videoPlayer" controls playsinline></video>
                    <div class="loading" id="loadingText">加载中...</div>
                </div>

                <div class="review-status-bar">
                    <div class="review-status-copy">
                        <span>审核状态</span>
                        <span id="reviewStatusHint" class="review-status-hint">通过或拒绝后会立即保存并显示结果。</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-prev" id="btnPrev" onclick="prevVideo()" disabled aria-label="上一个视频">⏮ 上一个</button>
                    <button class="btn btn-approve" id="btnApprove" onclick="approveVideo()">✅ 通过</button>
                    <button class="btn btn-next" id="btnNext" onclick="nextVideo()">⏭ 下一个</button>
                    <button class="btn btn-reject" id="btnReject" onclick="rejectVideo()">❌ 拒绝</button>
                </div>
            </div>

            <aside class="playlist-panel">
                <h3>当前页视频列表</h3>
                <div id="videoList" class="playlist-list"></div>
            </aside>
        </div>
 
        <div id="emptyState" class="empty-state" style="display:none">
            <h2 id="emptyStateTitle">当前页暂无视频</h2>
            <p id="emptyStateText">请使用上方页码工具手动切换页面。</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const REVIEW_PASSWORD = 'Xiner#4351';

        let isAuthenticated = false;
        let pendingAction = null;
        let pendingCancelAction = null;
        let videos = [];
        let allVideos = []; // unfiltered list from API
        let showDisabledOnly = false;
        let currentIndex = 0;
        let currentPage = 1;
        let totalPages = 1;
        let totalCount = 0;
        let hlsInstance = null;
        let hlsRetryCount = 0;
        const HLS_MAX_RETRIES = 3;
        let reviewedIds = [];
        let reviewStatuses = {};
        let recheckAll = false;
        let searchKeyword = '';

        // Password verification - only prompt if not yet authenticated
        function requirePassword(action, cancelAction = null) {
            if (isAuthenticated) {
                action();
                return;
            }
            pendingAction = action;
            pendingCancelAction = cancelAction;
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordOverlay').style.display = 'flex';
            document.getElementById('passwordInput').focus();
        }

        function submitPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === REVIEW_PASSWORD) {
                isAuthenticated = true;
                document.getElementById('passwordOverlay').style.display = 'none';
                const action = pendingAction;
                pendingAction = null;
                pendingCancelAction = null;
                if (action) action();
            } else {
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function cancelPassword() {
            document.getElementById('passwordOverlay').style.display = 'none';
            const cancelAction = pendingCancelAction;
            pendingAction = null;
            pendingCancelAction = null;
            if (cancelAction) cancelAction();
        }

        // Allow Enter key on password input
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitPassword();
            if (e.key === 'Escape') cancelPassword();
        });

        function getStoredReviewResult(video) {
            const status = reviewStatuses[String(video.id)];
            return status === 'approved' || status === 'rejected' ? status : null;
        }

        function getReviewStatus(video) {
            const result = getStoredReviewResult(video);
            return recheckAll || !result ? 'recheck' : result;
        }

        function isReviewed(video) {
            return getReviewStatus(video) !== 'recheck';
        }

        function getReviewStatusLabel(video) {
            const status = getReviewStatus(video);
            const originalResult = getStoredReviewResult(video);
            if (status === 'recheck') {
                if (recheckAll && originalResult) {
                    return `复审（原审核：${originalResult === 'approved' ? '已通过' : '已屏蔽'}）`;
                }
                return '复审';
            }
            return status === 'approved' ? '已通过' : '已屏蔽';
        }

        function getReviewStatusHint(video) {
            const status = getReviewStatus(video);
            const originalResult = getStoredReviewResult(video);
            if (status === 'recheck') {
                if (recheckAll && originalResult) {
                    return `复审中，原审核结果为“${originalResult === 'approved' ? '已通过' : '已屏蔽'}”，结果已保留。`;
                }
                return '尚未标注通过或屏蔽，处于复审状态。';
            }
            return status === 'approved' ? '已通过，审核结果已保存。' : '已屏蔽，视频已提交屏蔽。';
        }

        function findNextPendingIndex(startIndex) {
            for (let i = startIndex; i < videos.length; i++) {
                if (!isReviewed(videos[i])) {
                    return i;
                }
            }
            return -1;
        }

        function renderVideoList() {
            const listEl = document.getElementById('videoList');
            listEl.innerHTML = '';

            if (!videos.length) {
                const emptyEl = document.createElement('div');
                emptyEl.className = 'playlist-empty';
                emptyEl.textContent = '当前页暂无可展示的视频';
                listEl.appendChild(emptyEl);
                return;
            }

            videos.forEach((video, index) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'playlist-item';
                if (index === currentIndex) item.classList.add('current');
                const status = getReviewStatus(video);
                item.classList.add('status-' + status);
                item.onclick = () => {
                    currentIndex = index;
                    displayCurrentVideo();
                };

                const title = document.createElement('div');
                title.className = 'playlist-item-title';
                title.textContent = `${index + 1}. ${video.title || '无标题'}`;

                const meta = document.createElement('div');
                meta.className = 'playlist-item-meta';

                const idText = document.createElement('span');
                idText.textContent = `ID: ${video.id}`;

                const badge = document.createElement('span');
                badge.className = 'playlist-badge ' + status;
                badge.textContent = getReviewStatusLabel(video);

                if (isVideoDisabled(video)) {
                    const disabledBadge = document.createElement('span');
                    disabledBadge.className = 'playlist-badge';
                    disabledBadge.style.background = '#e94560';
                    disabledBadge.textContent = '已屏蔽';
                    meta.appendChild(disabledBadge);
                }

                meta.appendChild(idText);
                meta.appendChild(badge);
                item.appendChild(title);
                item.appendChild(meta);
                listEl.appendChild(item);
            });
        }

        // --- Server-side page number persistence ---
        async function loadPageNumberFromServer() {
            try {
                const resp = await fetch(API_BASE + '/review/pages');
                if (resp.ok) {
                    const data = await resp.json();
                    currentPage = data.current_page || 1;
                }
            } catch {
                // keep default currentPage = 1
            }
        }

        async function savePageNumberToServer(page) {
            try {
                await fetch(API_BASE + '/review/pages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_page: page }),
                });
            } catch (e) {
                console.warn('Failed to save page number:', e);
            }
        }

        async function fetchReviewedIds() {
            try {
                const resp = await fetch(API_BASE + '/review/state');
                if (resp.ok) {
                    applyReviewState(await resp.json());
                } else {
                    reviewedIds = [];
                    reviewStatuses = {};
                    recheckAll = false;
                }
            } catch {
                reviewedIds = [];
                reviewStatuses = {};
                recheckAll = false;
            }
        }

        function applyReviewState(data) {
            reviewedIds = data.reviewed_ids || [];
            reviewStatuses = data.statuses || {};
            recheckAll = Boolean(data.recheck_all);
            updateRecheckAllControl();
        }

        function getReviewedIds() {
            return reviewedIds;
        }

        async function setReviewStatus(id, status) {
            try {
                const resp = await fetch(API_BASE + '/review/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_id: id, status }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.error || '审核状态保存失败');
                }
                applyReviewState(data);
                updateStats();
                renderVideoList();
                updateCurrentReviewStatus();
                return true;
            } catch (err) {
                showToast('审核状态保存失败: ' + err.message, 'error');
                updateCurrentReviewStatus();
                return false;
            }
        }

        async function setRecheckAll(enabled) {
            try {
                const resp = await fetch(API_BASE + '/review/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recheck_all: enabled }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.error || '复审状态保存失败');
                }
                applyReviewState(data);
                updateStats();
                renderVideoList();
                updateCurrentReviewStatus();
                return true;
            } catch (err) {
                showToast('复审状态保存失败: ' + err.message, 'error');
                updateRecheckAllControl();
                return false;
            }
        }

        function updateRecheckAllControl() {
            const checkbox = document.getElementById('recheckAll');
            const label = document.getElementById('recheckAllLabel');
            checkbox.checked = recheckAll;
            label.classList.toggle('active', recheckAll);
        }

        function toggleRecheckAll() {
            const checkbox = document.getElementById('recheckAll');
            const requested = checkbox.checked;
            requirePassword(async () => {
                checkbox.disabled = true;
                const saved = await setRecheckAll(requested);
                checkbox.disabled = false;
                if (saved) {
                    showToast(requested ? '所有视频已进入复审，原审核结果已保留' : '已退出全量复审模式', 'info');
                }
            }, updateRecheckAllControl);
        }

        async function clearReviewed() {
            requirePassword(async () => {
                if (confirm('确定清除所有审核结果？清除后视频将回到复审状态。')) {
                    try {
                        const resp = await fetch(API_BASE + '/review/state', { method: 'DELETE' });
                        const data = await resp.json();
                        if (!resp.ok) {
                            throw new Error(data.error || '审核记录清除失败');
                        }
                        applyReviewState(data);
                    } catch (err) {
                        showToast('审核记录清除失败: ' + err.message, 'error');
                        return;
                    }
                    updateStats();
                    renderVideoList();
                    updateCurrentReviewStatus();
                    showToast('审核记录已清除', 'info');
                }
            });
        }

        function updateStats() {
            document.getElementById('reviewedCount').textContent = getReviewedIds().length;
            document.getElementById('recheckCount').textContent = videos.filter(video => getReviewStatus(video) === 'recheck').length;
            document.getElementById('currentPage').textContent = currentPage + '/' + totalPages;
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('pageJumpInput').value = currentPage;
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        function formatDuration(seconds) {
            if (!seconds) return '-';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + '分' + s + '秒';
        }

        function getBoundedPageNumber(value, minPage) {
            const page = parseInt(value, 10);
            if (Number.isNaN(page) || page < minPage) {
                return null;
            }
            if (totalPages > 0) {
                return Math.min(page, totalPages);
            }
            return page;
        }

        async function loadVideos(options = {}) {
            const { preferredIndex = null, preferLast = false } = options;
            try {
                const url = new URL(API_BASE + '/videos', window.location.origin);
                url.searchParams.set('page', currentPage);
                url.searchParams.set('per_page', '24');
                url.searchParams.set('order', 'DESC');
                if (searchKeyword) {
                    url.searchParams.set('search', searchKeyword);
                }

                const resp = await fetch(url);
                if (!resp.ok) {
                    throw new Error('接口返回异常');
                }

                const data = await resp.json();
                totalPages = data.total_pages || 1;
                totalCount = data.total_posts || data.total || 0;
                allVideos = Array.isArray(data.posts) ? data.posts : [];
                videos = applyDisabledFilter(allVideos);

                await savePageNumberToServer(currentPage);

                if (!videos.length) {
                    renderVideoList();
                    showEmptyState('当前页暂无可展示的视频', '筛选条件下没有视频；请手动切换页面或调整筛选条件。');
                    updateStats();
                    return;
                }

                if (typeof preferredIndex === 'number') {
                    currentIndex = Math.max(0, Math.min(preferredIndex, videos.length - 1));
                } else if (preferLast) {
                    currentIndex = videos.length - 1;
                } else if (showDisabledOnly) {
                    // When filtering blocked videos, show all of them regardless of review status
                    currentIndex = 0;
                } else {
                    const nextPendingIndex = findNextPendingIndex(0);
                    if (nextPendingIndex === -1) {
                        currentIndex = 0;
                    } else {
                        currentIndex = nextPendingIndex;
                    }
                }

                showVideoSection();
                updateStats();
                displayCurrentVideo();
            } catch (err) {
                showToast('加载视频失败: ' + err.message, 'error');
            }
        }

        function showEmptyState(title = '当前页暂无视频', message = '请使用上方页码工具手动切换页面。') {
            document.getElementById('emptyStateTitle').textContent = title;
            document.getElementById('emptyStateText').textContent = message;
            document.getElementById('contentLayout').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
        }

        function showVideoSection() {
            document.getElementById('contentLayout').style.display = 'grid';
            document.getElementById('emptyState').style.display = 'none';
        }

        function displayCurrentVideo() {
            if (!videos.length) {
                showEmptyState();
                updateStats();
                renderVideoList();
                return;
            }

            currentIndex = Math.max(0, Math.min(currentIndex, videos.length - 1));
            const video = videos[currentIndex];
            document.getElementById('videoTitle').textContent = video.title || '无标题';
            document.getElementById('videoId').textContent = video.id;
            document.getElementById('videoDuration').textContent = formatDuration(video.duration);
            document.getElementById('videoDate').textContent = video.created_at ? video.created_at.split('T')[0] : '-';
            updateCurrentReviewStatus();
            const loadingText = document.getElementById('loadingText');
            loadingText.textContent = '点击封面播放完整视频';
            loadingText.style.display = 'block';

            // Show cover image
            const coverImg = document.getElementById('videoCover');
            if (video.first_image) {
                coverImg.src = video.first_image;
                coverImg.style.display = 'block';
            } else {
                coverImg.style.display = 'none';
            }

            // Stop any current playback
            const videoEl = document.getElementById('videoPlayer');
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            videoEl.removeAttribute('src');
            videoEl.load();

            setButtonsEnabled(true);
            renderVideoList();
        }

        function updateCurrentReviewStatus() {
            const statusEl = document.getElementById('currentReviewStatus');
            const hintEl = document.getElementById('reviewStatusHint');

            if (!videos.length || currentIndex >= videos.length) {
                statusEl.className = 'playlist-badge recheck';
                statusEl.textContent = '复审';
                hintEl.textContent = '通过或屏蔽后会立即保存并显示结果。';
                return;
            }

            const video = videos[currentIndex];
            const status = getReviewStatus(video);
            statusEl.className = 'playlist-badge ' + status;
            statusEl.textContent = getReviewStatusLabel(video);
            hintEl.textContent = getReviewStatusHint(video);
        }

        async function startPlayback() {
            if (currentIndex >= videos.length) return;
            const video = videos[currentIndex];
            const loadingText = document.getElementById('loadingText');
            const coverImg = document.getElementById('videoCover');

            loadingText.textContent = '正在获取完整视频...';
            loadingText.style.display = 'block';

            // Use pre-fetched 720p URL from the video list if available
            if (video.video_url) {
                coverImg.style.display = 'none';
                playVideo(video.video_url);
                return;
            }

            // Fallback: try fetching 720p URL on demand with retries
            let videoURL = null;
            for (let attempt = 0; attempt < 3; attempt++) {
                try {
                    const resp = await fetch(API_BASE + '/videos/get-url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            post_id: video.id,
                            quality: '720p',
                            original_path: video.original_path || '',
                            p720_path: video.p720_path || '',
                        }),
                    });
                    const data = await resp.json();
                    if (resp.ok && data.video_url) {
                        videoURL = data.video_url;
                        break;
                    }
                } catch (e) { console.warn('get-url attempt failed:', e); }
                if (attempt < 2) await new Promise(r => setTimeout(r, 1000));
            }

            coverImg.style.display = 'none';
            if (videoURL) {
                playVideo(videoURL);
            } else {
                showToast('720p视频获取失败，使用预览质量', 'info');
                playVideo(video.preview_video_url);
            }
        }

        function getVideoFallbackURL(currentURL) {
            if (currentIndex >= videos.length) return '';
            const video = videos[currentIndex];
            if (currentURL !== video.preview_video_url) {
                return video.preview_video_url || '';
            }
            return '';
        }

        function handlePlaybackFailure(currentURL, message) {
            const loadingText = document.getElementById('loadingText');
            const fallbackURL = getVideoFallbackURL(currentURL);
            if (fallbackURL) {
                showToast('完整视频暂不可用，切换到预览视频', 'info');
                playVideo(fallbackURL);
                return;
            }
            loadingText.textContent = message || '视频加载失败';
            loadingText.style.display = 'block';
        }

        function playVideo(url) {
            const videoEl = document.getElementById('videoPlayer');
            const loadingText = document.getElementById('loadingText');

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (!url) {
                videoEl.removeAttribute('src');
                videoEl.load();
                loadingText.textContent = '无视频地址';
                return;
            }

            videoEl.removeAttribute('src');
            videoEl.load();
            hlsRetryCount = 0;

            videoEl.onerror = () => handlePlaybackFailure(url, '视频加载失败');

            if (url.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoEl);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    loadingText.style.display = 'none';
                    videoEl.play().catch(() => {});
                });
                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR && hlsRetryCount < HLS_MAX_RETRIES) {
                            hlsRetryCount++;
                            hlsInstance.startLoad();
                        } else {
                            hlsInstance.destroy();
                            hlsInstance = null;
                            handlePlaybackFailure(url, '视频加载失败');
                        }
                    }
                });
            } else if (url.includes('.m3u8') && videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                videoEl.src = url;
                videoEl.addEventListener('loadedmetadata', () => {
                    loadingText.style.display = 'none';
                    videoEl.play().catch(() => {});
                }, { once: true });
            } else {
                videoEl.src = url;
                videoEl.addEventListener('loadeddata', () => {
                    loadingText.style.display = 'none';
                }, { once: true });
            }
        }

        function setButtonsEnabled(enabled) {
            document.getElementById('btnApprove').disabled = !enabled;
            document.getElementById('btnReject').disabled = !enabled;
            document.getElementById('btnNext').disabled = !enabled;
            updatePrevButton();
        }

        function updatePrevButton() {
            document.getElementById('btnPrev').disabled = currentPage <= 1 && currentIndex <= 0;
        }

        async function approveVideo() {
            if (currentIndex >= videos.length) return;
            requirePassword(async () => {
                const video = videos[currentIndex];
                setButtonsEnabled(false);
                const saved = await setReviewStatus(video.id, 'approved');
                setButtonsEnabled(true);
                if (saved) {
                    showToast('已通过: ' + video.title, 'success');
                }
            });
        }

        async function rejectVideo() {
            if (currentIndex >= videos.length) return;
            requirePassword(async () => {
                const video = videos[currentIndex];
                setButtonsEnabled(false);

                try {
                    const resp = await fetch(API_BASE + '/videos/batch-disable', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ post_ids: [video.id] }),
                    });
                    const data = await resp.json();
                    if (!resp.ok || data.disabled < 1) {
                        throw new Error(data.results?.[0]?.message || data.error || '上游未确认屏蔽');
                    }
                    const saved = await setReviewStatus(video.id, 'rejected');
                    if (saved) {
                        showToast(`已拒绝并禁用: ${video.title}`, 'error');
                    }
                } catch (err) {
                    showToast(`禁用请求失败: ${err.message}`, 'error');
                } finally {
                    setButtonsEnabled(true);
                }
            });
        }

        function nextVideo() {
            if (currentIndex >= videos.length) return;
            if (currentIndex < videos.length - 1) {
                currentIndex++;
                displayCurrentVideo();
                return;
            }

            if (currentPage < totalPages) {
                currentPage++;
                loadVideos({ preferredIndex: 0 });
                return;
            }

            showToast('已经是最后一个视频', 'info');
        }

        function prevVideo() {
            if (currentIndex > 0) {
                currentIndex--;
                displayCurrentVideo();
                return;
            }

            if (currentPage > 1) {
                currentPage--;
                loadVideos({ preferLast: true });
            }
        }

        function jumpToPage() {
            const targetPage = getBoundedPageNumber(document.getElementById('pageJumpInput').value, 1);
            if (!targetPage) {
                showToast('请输入有效页码', 'error');
                return;
            }
            if (targetPage === currentPage) {
                showToast('已在当前页', 'info');
                return;
            }

            currentPage = targetPage;
            currentIndex = 0;
            loadVideos({ preferredIndex: 0 });
        }

        function markReviewedPages() {
            const reviewedPage = getBoundedPageNumber(document.getElementById('reviewedPageInput').value, 0);
            if (reviewedPage === null) {
                showToast('请输入有效页码', 'error');
                return;
            }

            const nextPage = totalPages > 0
                ? Math.min(reviewedPage + 1, totalPages)
                : reviewedPage + 1;

            currentPage = Math.max(1, nextPage);
            currentIndex = 0;
            loadVideos({ preferredIndex: 0 });
            showToast(`已从第 ${reviewedPage} 页之后继续`, 'success');
        }

        function doSearch() {
            const input = document.getElementById('searchInput').value.trim();
            searchKeyword = input;
            currentPage = 1;
            currentIndex = 0;
            document.getElementById('btnClearSearch').style.display = searchKeyword ? 'inline-block' : 'none';
            loadVideos();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchKeyword = '';
            currentPage = 1;
            currentIndex = 0;
            document.getElementById('btnClearSearch').style.display = 'none';
            loadVideos();
        }

        function isVideoDisabled(video) {
            return video.enable === false || video.enable === 0;
        }

        function applyDisabledFilter(list) {
            if (!showDisabledOnly) return list;
            return list.filter(v => isVideoDisabled(v));
        }

        function toggleDisabledFilter() {
            showDisabledOnly = document.getElementById('filterDisabled').checked;
            const label = document.getElementById('filterToggleLabel');
            if (showDisabledOnly) {
                label.classList.add('active');
            } else {
                label.classList.remove('active');
            }
            // Re-apply filter on current data
            videos = applyDisabledFilter(allVideos);
            currentIndex = 0;
            renderVideoList();
            if (videos.length) {
                displayCurrentVideo();
            } else {
                showEmptyState('当前页没有被屏蔽的视频', '请关闭“只显示被屏蔽视频”或手动切换页面。');
            }
            updateStats();
        }

        // Init: restore remembered page state from the server, load reviewed IDs, then resume review
        (async () => {
            await loadPageNumberFromServer();
            await fetchReviewedIds();
            updateStats();
            loadVideos();
            // Allow Enter key to trigger search
            document.getElementById('searchInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doSearch();
            });
            document.getElementById('pageJumpInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') jumpToPage();
            });
            document.getElementById('reviewedPageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') markReviewedPages();
            });
        })();
    </script>
</body>
</html>
